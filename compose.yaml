name: zabbix-oneclick

services:
  mysql:
    image: mysql:8.0
    container_name: zabbix-mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_bin
      - --default-authentication-plugin=mysql_native_password
      - --log-bin-trust-function-creators=1
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  zabbix-server:
    image: zabbix/zabbix-server-mysql:${ZABBIX_IMAGE_TAG}
    container_name: zabbix-server
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_CACHESIZE: ${ZBX_CACHESIZE}
      ZBX_TRENDCACHESIZE: ${ZBX_TRENDCACHESIZE}
      ZBX_JAVAGATEWAY_ENABLE: "true"
      ZBX_JAVAGATEWAY: zabbix-java-gateway
      ZBX_STARTJAVAPOLLERS: ${ZBX_STARTJAVAPOLLERS}
      ZBX_WEBSERVICEURL: http://zabbix-web-service:10053/report
      ZBX_STARTREPORTWRITERS: ${ZBX_STARTREPORTWRITERS}
    depends_on:
      mysql:
        condition: service_healthy
      zabbix-java-gateway:
        condition: service_started
      zabbix-web-service:
        condition: service_started
    ports:
      - "${ZABBIX_SERVER_PORT}:10051"
    restart: unless-stopped

  zabbix-web:
    image: zabbix/zabbix-web-nginx-mysql:${ZABBIX_IMAGE_TAG}
    container_name: zabbix-web
    environment:
      DB_SERVER_HOST: mysql
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      ZBX_SERVER_HOST: zabbix-server
      PHP_TZ: ${PHP_TZ}
    depends_on:
      mysql:
        condition: service_healthy
      zabbix-server:
        condition: service_started
    ports:
      - "${ZABBIX_WEB_PORT}:8080"
    restart: unless-stopped

  zabbix-agent2:
    image: zabbix/zabbix-agent2:${ZABBIX_IMAGE_TAG}
    container_name: zabbix-agent2
    environment:
      ZBX_HOSTNAME: Zabbix server
      ZBX_SERVER_HOST: zabbix-server
    depends_on:
      zabbix-server:
        condition: service_started
    restart: unless-stopped

  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:${ZABBIX_IMAGE_TAG}
    container_name: zabbix-java-gateway
    restart: unless-stopped

  zabbix-web-service:
    image: zabbix/zabbix-web-service:${ZABBIX_IMAGE_TAG}
    container_name: zabbix-web-service
    environment:
      ZBX_ALLOWEDIP: zabbix-server,zabbix-web
    shm_size: 1gb
    restart: unless-stopped

volumes:
  mysql_data:
